# ==========================================================
# Water Potability MLOps Training Configuration
# Modify these values to experiment with different pipelines
# ==========================================================

# Path to training dataset
file_csv: dataset/water_potability.csv

# Machine Learning Algorithm
# Available options:
# - ada_boost
# - log_reg
# - random_forest
# - svc
# - light_gbm
classifier_type: random_forest

# Missing Value Handling Method
# Available options:
# - simple      (mean/median imputation)
# - knn         (K-Nearest Neighbors imputation)
# - iterative   (Iterative/MICE imputation)
imputer_type: knn

# Feature Scaling / Preprocessing
# Available options:
# - none
# - std         (StandardScaler)
# - min_max     (MinMaxScaler)
# - norm        (Normalizer)
# - poly        (Polynomial Features)
# - robust      (RobustScaler)
preprocessor_type: none

# Feature Transformation
# Available options:
# - none
# - power_box_cox
# - power_yeo_johnson
#
# Note:
# Box-Cox requires all values to be positive.
transformer_type: none

# Principal Component Analysis (Dimensionality Reduction)
# Available values:
# - true
# - false
#
# When enabled, PCA will automatically search
# for the best number of components.
is_pca: false
